<app-hero title="Fach bearbeiten"></app-hero>
<form [formGroup]="editSubjectForm" (ngSubmit)="editSubject()">
  <div class="container">
    @if (subject) {
      <div class="center">
        <mat-form-field class="example-full-width">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" name="name" id="name" type="text">
        </mat-form-field>
        <mat-form-field class="example-full-width">
          <mat-label>Fachbereich</mat-label>
          <mat-select formControlName="subjectArea" [compareWith]="compareSubjectAreaObjects">

            @for (subjectArea of subjectAreaResponses; track subjectArea.subjectAreaId) {
              <mat-option value="{{subjectArea.subjectAreaId}}"> {{ subjectArea.name }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
        <button mat-raised-button color="primary" type="submit">Fach bearbeiten</button>
      </div>
    } @else {
      <div class="spinner">
        <mat-progress-spinner
          color="primary"
          mode="indeterminate">
        </mat-progress-spinner>
      </div>
    }
  </div>
</form>
